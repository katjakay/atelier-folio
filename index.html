<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atelier Folio — a wardrobe, catalogued</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#EDEBE4;
  --panel:#F6F5F1;
  --ink:#17140E;
  --ink-soft:#5B564C;
  --line:#D8D3C7;
  --accent:#6E6CEB;
  --chip:#E3DFD5;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;background:var(--paper);color:var(--ink);
  font-family:"Space Grotesk",system-ui,sans-serif;
  font-size:16px;line-height:1.4;letter-spacing:-0.01em;
  overflow-x:hidden;
}
a{color:inherit}
.mono{font-family:"Space Mono",ui-monospace,monospace}
.eyebrow{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-soft)}

/* cursor dot */
.cursor{position:fixed;top:0;left:0;width:9px;height:9px;border-radius:50%;
  background:var(--accent);pointer-events:none;z-index:200;
  transform:translate(-50%,-50%);transition:transform .12s ease, opacity .2s;mix-blend-mode:multiply}

/* header */
header{position:sticky;top:0;z-index:60;background:rgba(237,235,228,.86);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.bar{display:flex;align-items:baseline;justify-content:space-between;
  gap:20px;padding:16px clamp(18px,5vw,56px)}
.wordmark{font-weight:600;font-size:15px;letter-spacing:.02em}
.wordmark span{color:var(--accent)}
.count{font-family:"Space Mono",monospace;font-size:12px;color:var(--ink-soft)}

/* hero */
.hero{padding:clamp(46px,10vw,120px) clamp(18px,5vw,56px) clamp(28px,5vw,60px);
  position:relative}
.hero h1{margin:14px 0 0;font-weight:400;letter-spacing:-0.035em;line-height:.94;
  font-size:clamp(44px,11vw,140px)}
.hero h1 em{font-style:normal;color:var(--accent)}
.hero .lede{max-width:44ch;margin:26px 0 0;color:var(--ink-soft);font-size:clamp(15px,1.5vw,18px)}

/* controls */
.controls{display:flex;flex-wrap:wrap;row-gap:14px;flex-wrap:wrap;gap:10px 26px;align-items:center;
  padding:8px clamp(18px,5vw,56px) 4px;position:sticky;top:53px;z-index:50;
  background:rgba(237,235,228,.86);backdrop-filter:blur(8px)}
.filterset{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.flabel{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--ink-soft);margin-right:2px}
.chip{font-family:"Space Mono",monospace;font-size:12px;border:1px solid var(--line);
  background:transparent;color:var(--ink);padding:5px 12px;border-radius:100px;cursor:pointer;
  transition:.16s;letter-spacing:.02em}
.chip:hover{border-color:var(--ink)}
.chip[aria-pressed="true"]{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.spacer{flex:1 1 40px}
.fitlink{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);text-decoration:none;border-bottom:1px solid transparent;padding-bottom:2px}
.fitlink:hover{border-bottom-color:var(--accent)}
.views{display:flex;gap:4px;border:1px solid var(--line);border-radius:100px;padding:3px}
.views button{font-family:"Space Mono",monospace;font-size:12px;border:0;background:transparent;
  color:var(--ink-soft);padding:5px 14px;border-radius:100px;cursor:pointer}
.views button[aria-pressed="true"]{background:var(--accent);color:#fff}

/* stage */
.stage{padding:22px clamp(18px,5vw,56px) 60px;position:relative;min-height:60vh}

/* index grid */
/* masonry index */
.grid{column-count:4;column-gap:clamp(16px,2vw,30px)}
.card{break-inside:avoid;-webkit-column-break-inside:avoid;page-break-inside:avoid;
  display:block;cursor:pointer;margin:0 0 clamp(20px,2.4vw,38px);animation:rise .5s both}
.card .frame{background:var(--panel);border:1px solid var(--line);overflow:hidden;
  padding:14px;display:flex;align-items:center;justify-content:center;
  transition:box-shadow .35s}
.card .frame img{display:block;width:100%;height:auto;mix-blend-mode:multiply;
  transition:transform .5s cubic-bezier(.2,.7,.2,1)}
.card .frame.empty{min-height:200px}
.card:hover .frame{box-shadow:0 26px 50px -34px rgba(0,0,0,.55)}
.card:hover .frame img{transform:scale(1.04)}
.meta{padding:12px 2px 0;display:flex;justify-content:space-between;gap:14px}
.meta .l{min-width:0}
.brand{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--ink-soft)}
.pname{font-size:15px;margin-top:3px;font-weight:500;letter-spacing:-0.01em;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sub{font-family:"Space Mono",monospace;font-size:11px;color:var(--ink-soft);
  margin-top:5px;display:flex;align-items:center;gap:7px}
.dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,.18);flex:none}
.price{font-family:"Space Mono",monospace;font-size:13px;white-space:nowrap}
@media(max-width:1200px){.grid{column-count:3}}
@media(max-width:820px){.grid{column-count:2}}
@media(max-width:460px){.grid{column-count:2;column-gap:14px}
  .card{margin-bottom:18px}.card .frame{padding:10px}}

/* scatter */
.scatter{position:relative;min-height:1200px}
.scatter .card{position:absolute;width:210px;animation:none}
.scatter .card .frame{height:250px}
.scatter .card .frame img{width:auto;max-width:100%;max-height:100%;object-fit:contain}
.scatter .card{touch-action:none}
.scatter .tag{position:absolute;top:8px;left:8px;z-index:2;
  font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.12em;
  background:var(--paper);border:1px solid var(--line);padding:2px 7px;border-radius:100px}
.scatter .meta{opacity:0;transition:.2s}
.scatter .card:hover .meta{opacity:1}
.hint{font-family:"Space Mono",monospace;font-size:11px;color:var(--ink-soft);
  text-align:center;padding:6px 0 18px;letter-spacing:.08em}
@media(max-width:720px){.scatter{display:grid;grid-template-columns:1fr 1fr;gap:18px;min-height:0}
  .scatter .card{position:static!important;width:auto;transform:none!important}
  .hint{display:none}}

@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* lightbox */
.lb{position:fixed;inset:0;z-index:120;display:none;background:rgba(23,20,14,.62);
  backdrop-filter:blur(3px);padding:clamp(14px,4vw,48px)}
.lb.open{display:grid;place-items:center}
.sheet{background:var(--paper);border:1px solid var(--line);max-width:920px;width:100%;
  max-height:90vh;overflow:auto;display:grid;grid-template-columns:1.1fr .9fr;
  animation:rise .3s both}
.sheet .big{background:var(--panel);border-right:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;padding:34px;min-height:340px}
.sheet .big img{max-width:100%;max-height:64vh;object-fit:contain;mix-blend-mode:multiply}
.sheet .info{padding:clamp(22px,3vw,40px);position:relative}
.sheet .info h2{margin:14px 0 2px;font-weight:500;font-size:clamp(24px,3vw,34px);
  letter-spacing:-0.02em;line-height:1.02}
.spec{margin-top:24px;border-top:1px solid var(--line)}
.spec .row{display:flex;justify-content:space-between;gap:16px;padding:11px 0;
  border-bottom:1px solid var(--line);font-family:"Space Mono",monospace;font-size:13px}
.spec .row .k{color:var(--ink-soft);letter-spacing:.08em;text-transform:uppercase;font-size:11px}
.close{position:absolute;top:14px;right:16px;border:1px solid var(--line);background:transparent;
  width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:16px;line-height:1}
.close:hover{border-color:var(--ink)}
@media(max-width:680px){.sheet{grid-template-columns:1fr}
  .sheet .big{border-right:0;border-bottom:1px solid var(--line)}}

footer{border-top:1px solid var(--line);padding:34px clamp(18px,5vw,56px);
  display:flex;flex-wrap:wrap;gap:16px;justify-content:space-between;
  font-family:"Space Mono",monospace;font-size:11px;color:var(--ink-soft);letter-spacing:.06em}

:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="cursor" id="cursor" aria-hidden="true"></div>

<header>
  <div class="bar">
    <div class="wordmark">ATELIER <span>·</span> FOLIO</div>
    <div class="count mono" id="count">loading…</div>
  </div>
</header>

<section class="hero">
  <p class="eyebrow">Personal archive — 2026</p>
  <h1>Apparel<br><em>Inventory</em></h1>
  <p class="lede">Every garment, shoe and accessory I own.</p>
</section>

<div class="controls">
  <div class="filterset" id="catset"><span class="flabel">Type</span></div>
  <div class="spacer"></div>
  <div class="filterset" id="brandset"><span class="flabel">House</span></div>
  <div class="spacer"></div>
  <div class="filterset" id="seasonset"><span class="flabel">Season</span></div>
  <div class="spacer"></div>
  <div class="filterset" id="formset"><span class="flabel">Wear</span></div>
  <div class="spacer"></div>
  <div class="filterset" id="eraset"><span class="flabel">Era</span></div>
  <a class="fitlink" href="fitting.html">Fitting room →</a>
  <div class="views" role="group" aria-label="View">
    <button id="vIndex" aria-pressed="true">Index</button>
    <button id="vScatter" aria-pressed="false">Scatter</button>
  </div>
</div>

<main class="stage">
  <p class="hint" id="hint" style="display:none">Drag the pieces around — they stay where you leave them.</p>
  <div class="grid" id="stage"></div>
</main>

<div class="lb" id="lb" role="dialog" aria-modal="true" aria-label="Piece detail">
  <div class="sheet" id="sheet"></div>
</div>

<footer>
  <span id="stamp">wardrobe inventory</span>
  <span>Images © their respective brands</span>
</footer>

<script>
let DATA = [];

const SWATCH={"light grey":"#c9c9c9","black":"#1c1c1c","beige":"#d8c7a8","off black":"#2a2a2a",
"off white":"#efeae0","mole dark":"#6f6357","crystal linen":"#e6ddcb","aurora coffee":"#7c6a5d",
"scampi":"#e8825f","better scarlet/white":"#c2352c","night indigo/white":"#2f3552",
"Weiß":"#f2efe8","braun":"#7c5a3a"};
const swatch=c=>SWATCH[c]||"#bdb6a6";
const eur=s=>{const m=(s||"").replace(/\./g,"").match(/(\d+),(\d{2})/);return m?+m[1]+ +m[2]/100:null;};
const cpw=d=>{const p=eur(d.price);if(p==null||!d.worn)return"—";
  const v=p/d.worn;return(v<10?v.toFixed(2):Math.round(v))+" € / Tragen";};
const esc=s=>String(s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));

let state={cat:"All",brand:"All",season:"All",form:"All",era:"All",view:"index"};
const stage=document.getElementById('stage');

/* build filter chips */
function chips(id,key,values){
  const box=document.getElementById(id);
  ["All",...values].forEach(v=>{
    const b=document.createElement('button');
    b.className='chip';b.textContent=v;b.setAttribute('aria-pressed',v===state[key]);
    b.onclick=()=>{state[key]=v;[...box.querySelectorAll('.chip')].forEach(c=>c.setAttribute('aria-pressed',c.textContent===v));render()};
    box.appendChild(b);
  });
}
function buildChrome(){
  chips('catset','cat',[...new Set(DATA.flatMap(d=>d.categories))]);
  chips('brandset','brand',[...new Set(DATA.map(d=>d.brand).filter(Boolean))]);
  chips('seasonset','season',[...new Set(DATA.flatMap(d=>d.seasons||[]))]);
  chips('formset','form',[...new Set(DATA.map(d=>d.formality).filter(Boolean))]);
  chips('eraset','era',[...new Set(DATA.map(d=>d.era).filter(Boolean))]);
}

function filtered(){
  return DATA.filter(d=>(state.cat==="All"||d.categories.includes(state.cat))&&(state.brand==="All"||d.brand===state.brand)&&(state.season==="All"||(d.seasons||[]).includes(state.season))&&(state.form==="All"||d.formality===state.form)&&(state.era==="All"||d.era===state.era));
}

function cardEl(d,i){
  const el=document.createElement('article');
  el.className='card';
  el.style.animationDelay=(i*0.03)+'s';
  el.tabIndex=0;
  el.innerHTML=`
    <div class="frame${d.image?'':' empty'}">${d.image?`<img loading="lazy" src="${d.image}" alt="${esc(d.brand)} ${esc(d.name)}">`:`<span class="mono" style="font-size:11px;color:var(--ink-soft);letter-spacing:.14em">NO IMAGE</span>`}</div>
    <div class="meta">
      <div class="l">
        <div class="brand">${esc(d.brand)}</div>
        <div class="pname">${esc(d.name)}</div>
        <div class="sub"><span class="dot" style="background:${swatch(d.color)}"></span>${esc(d.color)} · ${esc(d.categories[0])}</div>
      </div>
      <div class="price">${esc(d.price)}</div>
    </div>`;
  const open=()=>openSheet(d);
  el.onclick=open;
  el.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();open();}};
  return el;
}

function render(){
  const list=filtered();
  document.getElementById('count').textContent=list.length+(list.length===1?' piece':' pieces');
  stage.className=state.view==='index'?'grid':'scatter';
  document.getElementById('hint').style.display=state.view==='scatter'?'block':'none';
  stage.innerHTML='';
  list.forEach((d,i)=>{
    const el=cardEl(d,i);
    if(state.view==='scatter') placeScatter(el,i,list.length);
    stage.appendChild(el);
  });
}

/* scatter placement + drag */
function placeScatter(el,i,n){
  const cols=Math.min(4,Math.max(2,Math.round(window.innerWidth/340)));
  const col=i%cols, row=Math.floor(i/cols);
  const jx=((i*53)%40)-20, jy=((i*29)%36)-18, rot=((i*37)%16)-8;
  const w=window.innerWidth<1200?window.innerWidth-90:1100;
  const x=40+col*(w/cols)+jx;
  const y=20+row*300+jy;
  el.style.left=x+'px';el.style.top=y+'px';el.style.transform='rotate('+rot+'deg)';
  const tag=document.createElement('span');tag.className='tag mono';tag.textContent=String(i+1).padStart(2,'0');
  el.appendChild(tag);
  makeDraggable(el);
}
function makeDraggable(el){
  let sx,sy,ox,oy,drag=false,moved=false;
  el.addEventListener('pointerdown',e=>{
    drag=true;moved=false;el.setPointerCapture(e.pointerId);
    sx=e.clientX;sy=e.clientY;ox=parseFloat(el.style.left);oy=parseFloat(el.style.top);
    el.style.zIndex=50;el.style.cursor='grabbing';
  });
  el.addEventListener('pointermove',e=>{
    if(!drag)return;const dx=e.clientX-sx,dy=e.clientY-sy;
    if(Math.abs(dx)+Math.abs(dy)>4)moved=true;
    el.style.left=(ox+dx)+'px';el.style.top=(oy+dy)+'px';
  });
  const up=()=>{drag=false;el.style.cursor='grab';};
  el.addEventListener('pointerup',up);el.addEventListener('pointercancel',up);
  el.addEventListener('click',e=>{if(moved){e.stopPropagation();e.preventDefault();}},true);
}

/* lightbox */
const lb=document.getElementById('lb'),sheet=document.getElementById('sheet');
function openSheet(d){
  const rows=[["Brand",d.brand],["Category",d.categories.join(" / ")],["Colour",d.color],["Size",d.size],
    ["Price",d.price],["Season",(d.seasons||[]).join(" / ")||"—"],["Wear",d.formality||"—"],["Era",d.era||"—"],["Worn",d.worn==null?"—":d.worn+"×"],["Image",d.own_photo?"own photo":d.image?"retailer":"—"],["Per wear",cpw(d)]];
  sheet.innerHTML=`
    <div class="big">${d.image?`<img src="${d.image}" alt="${esc(d.brand)} ${esc(d.name)}">`:`<span class="mono" style="font-size:12px;color:var(--ink-soft);letter-spacing:.14em">NO IMAGE</span>`}</div>
    <div class="info">
      <button class="close" aria-label="Close" id="x">×</button>
      <p class="eyebrow">${esc(d.brand)}</p>
      <h2>${esc(d.name)}</h2>
      <div class="spec">${rows.map(r=>`<div class="row"><span class="k">${r[0]}</span><span>${esc(r[1])}</span></div>`).join('')}</div>
    </div>`;
  lb.classList.add('open');document.getElementById('x').onclick=closeSheet;
}
function closeSheet(){lb.classList.remove('open')}
lb.addEventListener('click',e=>{if(e.target===lb)closeSheet()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSheet()});

/* view toggle */
const vI=document.getElementById('vIndex'),vS=document.getElementById('vScatter');
vI.onclick=()=>{state.view='index';vI.setAttribute('aria-pressed','true');vS.setAttribute('aria-pressed','false');render()};
vS.onclick=()=>{state.view='scatter';vS.setAttribute('aria-pressed','true');vI.setAttribute('aria-pressed','false');render()};

/* cursor dot (desktop only) */
const cur=document.getElementById('cursor');
if(matchMedia('(pointer:fine)').matches){
  addEventListener('pointermove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px'});
  addEventListener('pointerdown',()=>cur.style.transform='translate(-50%,-50%) scale(2)');
  addEventListener('pointerup',()=>cur.style.transform='translate(-50%,-50%) scale(1)');
}else{cur.style.display='none'}

addEventListener('resize',()=>{if(state.view==='scatter')render()});

/* ---- load data ---- */
fetch('data.json?v='+Date.now())
  .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
  .then(payload=>{
    DATA=(payload.items||[]).filter(d=>d.status!=='Wishlist');
    buildChrome();
    render();
    const d=new Date(payload.generated_at);
    document.getElementById('stamp').textContent=
      DATA.length+' pieces · '+payload.brands+' brands · updated '+
      d.toISOString().slice(0,10);
  })
  .catch(err=>{
    stage.innerHTML='<p class="hint" style="display:block">'+
      'Could not load the catalogue. The last build may still be running — try again in a minute.</p>';
    console.error(err);
  });
</script>
</body>
</html>
